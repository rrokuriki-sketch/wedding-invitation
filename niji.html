<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Driveの画像を確実に表示させるためのリファラー制御 -->
    <meta name="referrer" content="no-referrer">
    
    <title>Niji no Kai - MEMORIES</title>
    <meta name="description" content="Niji no Kai Photo Gallery">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="photo-style.css">
</head>

<body>
    <!-- Visual Effects -->
    <div class="grain-overlay"></div>
    <div class="light-overlay"></div>
    <div class="particles-container" id="particles"></div>

    <!-- Back Button -->
    <a href="indexphoto.html" class="back-button">Back</a>

    <!-- Page Wrapper -->
    <div class="page-wrapper">
        <div class="gallery-page">
            <!-- Header -->
            <div class="gallery-header">
                <h1 class="gallery-title">Niji no Kai</h1>
                <p class="gallery-subtitle">Photo Gallery</p>
                <p class="gallery-count"></p>
            </div>

            <!-- Photo Grid -->
            <div class="gallery-container">
                <div class="gallery-grid" data-album="05 大学(虹の会)">
                    <div class="loading-spinner"></div>
                </div>
            </div>

            <!-- Footer -->
            <div class="photo-footer">
                <p>© 2026 Ryō & Mihiro</p>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" aria-label="Close"></button>
        <button class="lightbox-nav lightbox-prev" aria-label="Previous"></button>
        <div class="lightbox-content"></div>
        <button class="lightbox-nav lightbox-next" aria-label="Next"></button>
        <div class="lightbox-counter"></div>
    </div>

    <script src="photo-script.js"></script>
</body>

</html>
